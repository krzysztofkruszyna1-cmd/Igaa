<!doctype html><meta charset=utf-8><style>body{font-family:Arial;background:#111;color:#fff;text-align:center}#m{display:none}img{max-width:45%;margin:8px;border-radius:10px}</style>
<div id=l><h1>🔒 Niespodzianka</h1><input id=p type=password><button onclick="o()">Otwórz</button><p id=e></p></div>
<div id=m><h1>Dla Ciebie ❤️</h1><div id=c></div><img src='images/1.jpeg'><img src='images/2.jpeg'><img src='images/3.jpeg'><img src='images/4.jpeg'></div>
<script>
function o(){if(p.value==='2811'){l.style.display='none';m.style.display='block'}else e.innerText='Błędne hasło';}
let s=new Date('2024-05-25T17:00:00');
setInterval(()=>{let d=new Date()-s;let sec=Math.floor(d/1000),min=Math.floor(sec/60),hr=Math.floor(min/60),day=Math.floor(hr/24);c.innerText=`Razem: ${day} dni | ${hr} godzin | ${min} minut | ${sec} sekund`;},1000);
</script>
