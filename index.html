<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nasza Historia ❤️</title>
<style>
body{margin:0;font-family:Georgia,serif;background:linear-gradient(135deg,#f8d7da,#fff0f5);overflow-x:hidden;color:#5a2a3a;text-align:center}
#lock,#content{padding:30px}
input{padding:10px}button{padding:10px 18px}
.gallery img{max-width:220px;margin:10px;border-radius:15px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.quote{font-style:italic;margin:18px auto;max-width:700px}
.heart{position:fixed;bottom:-20px;font-size:20px;animation:float 8s linear infinite;opacity:.7}
@keyframes float{to{transform:translateY(-110vh);opacity:0}}
</style>
</head>
<body>
<div id="lock">
<h2>❤️ Prywatna strona ❤️</h2>
<p>Podaj hasło:</p>
<input id="pw" type="password"><button onclick="check()">Wejdź</button>
<p id="err" style="color:red"></p>
</div>
<div id="content" style="display:none">
<h1>Nasza Historia ❤️</h1>
<h2>Jesteśmy razem od:</h2>
<div id="counter" style="font-size:1.4em;font-weight:bold"></div>
<div class="gallery">
<img src="1.jpeg"><img src="2.jpeg"><img src="3.jpeg"><img src="4.jpeg">
</div>
<div class="quote">„Miłość nie polega na patrzeniu na siebie, lecz na patrzeniu razem w tym samym kierunku.”</div>
<div class="quote">„Każdy dzień z Tobą jest moim ulubionym dniem.”</div>
<div class="quote">„Na zawsze zaczyna się od Ciebie.”</div>
</div>
<script>
function check(){if(pw.value==="2811"){lock.style.display="none";content.style.display="block";}else err.textContent="Nieprawidłowe hasło";}
const start=new Date("2024-05-25T17:00:00");
setInterval(()=>{
 let now=new Date(),d=now-start;
 let s=Math.floor(d/1000),days=Math.floor(s/86400);s%=86400;
 let h=Math.floor(s/3600);s%=3600;let m=Math.floor(s/60);s%=60;
 let el=document.getElementById("counter"); if(el)el.textContent=`${days} dni ${h} godz ${m} min ${s} sek`;
},1000);
setInterval(()=>{
 let e=document.createElement("div");e.className="heart";e.textContent="❤";
 e.style.left=Math.random()*100+"vw";e.style.animationDuration=(5+Math.random()*5)+"s";
 document.body.appendChild(e);setTimeout(()=>e.remove(),10000);
},400);
</script>
</body></html>
